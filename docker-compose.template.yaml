services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      web:
        condition: service_started
    ports:
      - "11234:80"
    command:
      - sh
      - -c
      - |
        cat >/etc/caddy/Caddyfile <<'EOF'
        http:// {
          rewrite / /app
          handle_path /app* {
            reverse_proxy web:80
          }
        
          reverse_proxy backend:80
        }
        EOF

        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  database:
    image: postgres:18
    environment:
      POSTGRES_USER: hexo
      POSTGRES_PASSWORD: hexo
      POSTGRES_DB: hexo
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hexo -d hexo" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - hexo:/var/lib/postgresql

  backend:
    build:
      context: .
      dockerfile: launcher/Dockerfile
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    expose:
      - "80"
    environment:
      bot.token: # Get from discord dashboard
      oauth2.clientId: # Get from discord dashboard
      oauth2.clientSecret: # Get from discord dashboard
      oauth2.encryptionKey: # Generate with `openssl rand -base64 32`
      database.url: jdbc:postgresql://database:5432/hexo?user=hexo&password=hexo
      server.port: 80
      server.url: https://example.com # The public domain under which this service will be available

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        WEB_BASE_PATH: /app
        WEB_API_PROXY: https://hexo.mineking.dev/proxy
    restart: unless-stopped
    expose:
      - "80"

volumes:
  hexo:
  caddy_data:
  caddy_config:
