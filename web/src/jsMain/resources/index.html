<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/x-icon" href="@WEB_BASE_PATH@/favicon.png">
    <link rel="stylesheet" href="@WEB_BASE_PATH@/styles.css">
    <title>HeXO</title>
</head>
<body class="bg-slate-950 font-sans text-slate-50" style="margin: 0">
    <main id="root">
        <section class="flex min-h-dvh flex-col bg-slate-950 md:flex-row" aria-label="Loading editor">
            <div class="min-h-0 flex-1 flex p-3 md:p-6">
                <div class="grid grow min-h-90 place-items-center rounded-2xl border border-slate-800 bg-linear-to-br from-slate-900 to-slate-900/30 shadow-2xl shadow-black/30">
                    <div class="size-9 animate-spin rounded-full border-5 border-slate-400/30 border-t-emerald-400"></div>
                </div>
            </div>
            <aside class="border-t border-slate-800 bg-slate-900/80 p-5 md:w-95 md:border-l md:border-t-0 md:px-6 md:py-7">
                <div class="grid max-w-md gap-3.5">
                    <div class="h-6 w-24 animate-pulse rounded-lg bg-slate-700"></div>
                    <div class="h-32 animate-pulse rounded-lg bg-slate-800"></div>
                    <div class="h-3.5 w-[72%] animate-pulse rounded-lg bg-slate-700"></div>
                    <div class="h-3.5 w-[52%] animate-pulse rounded-lg bg-slate-700"></div>
                </div>
            </aside>
        </section>
    </main>
    <script>
        window.__HEXO_BASE_PATH__ = "@WEB_BASE_PATH@";
    </script>
    <script src="@WEB_BASE_PATH@/web.js"></script>
</body>
</html>
