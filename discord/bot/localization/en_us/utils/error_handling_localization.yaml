response.error:
  # Internal helper to avoid duplication
  format: !<content:String> |-
    ## Unexpected Error
    
    $content. The developer has been informed about this issue.

  command: ${ response_error_format(locale, "An unexpected error occurred whilst executing this command") }
  menu:
    message:
      component: ${ response_error_format(locale, "An unexpected error occurred whilst handling this component") }
      render: ${ response_error_format(locale, "An unexpected error occurred whilst rendering this menu") }
    modal:
      handler: ${ response_error_format(locale, "An unexpected error occurred whilst handling this modal") }
