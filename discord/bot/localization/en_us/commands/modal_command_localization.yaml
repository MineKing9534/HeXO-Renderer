command.render:
  description: Opens a modal to render notation and normal text in a single message

menu.hexo:
  title: Render HeXO Notation
  inputs:
    theme:
      label: Theme
      description: The theme to use for rendering notation
      options:
        HDS.label: hexo.did.science
        HTTTX.label: explore.htttx.io
        Tyto.label: hexo.tyto.cc
    input:
      label: Message
      description: The message to render. Use code blocks to indicate HeXO notation.
      placeholder: |-
        Sword Opening:
        ```
        . . . . o
         o . x x x o
          . . . o
        ```
