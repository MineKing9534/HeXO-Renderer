command:
  renderMessage.description: Render HeXO notation in message
  hexo:
    description: Renders the given Rectilinear HeXO notation
    options:
      input.description: The Rectilinear HeXO notation to render
      theme:
        description: "The theme to use for rendering [Default: HDS]"
        choices:
          HDS: hexo.did.science
          HTTTX: explore.htttx.io
          Tyto: hexo.tyto.cc

response.error: |-
  ## Failed to parse the given input
  
  ```hexo
  $input
  ```
  ${message ?: ""}

menu.hexo:
  title: Render HeXO Notation
  inputs:
    input:
      label: Message
      description: The message to render. Use code blocks to indicate HeXO notation.
      placeholder: |-
        Sword Opening:
        ```
        . . . . o
         o . x x x o
          . . . o
        ```
