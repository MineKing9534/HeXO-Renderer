error:
  match.not.found: |-
    ## Game not found
    The queried game with id **${id.value}** was not found!

menu.game:
  title.content: !<game:FinishedGame> |-
    # ${
        when {
            game.tournamentInfo != null -> ":dart:"
            game.options.rated -> ":trophy:"
            else -> ":seedling:"
        }
    } Game Review
    ${ game.tournamentInfo?.let { tournamentInfo ->
      "-# Tournament: [${tournamentInfo.tournamentName}](${tournamentInfo.tournamentUrl})${if (tournamentInfo.bestOf > 1) ", G${tournamentInfo.currentGameNumber} (BO${tournamentInfo.bestOf})" else ""}"
    } ?: "" }

  view.label: View in Browser
  move:
    title: Enter the move to inspect
    inputs:
      move:
        label: Move number
        description: !<game:FinishedGame> The move to inspect [1-${game.moves.size}]
        placeholder: 42
  notation:
    label: Show Notation
    title: Game State Notation
  turn.label: Show Turn Numbers

finish.reason: >-
  ${
    when (reason) {
        GameFinishReason.SixInARow -> "Six in a row"
        GameFinishReason.Timeout -> "Timeout"
        GameFinishReason.Surrender -> "Surrender"
        GameFinishReason.Disconnect -> "Disconnect"
        GameFinishReason.DrawAgreement -> "Draw"
        GameFinishReason.Terminated -> "Terminated"
    }
  }

time.control: >-
  ${
    when (control) {
        is TimeControl.Unlimited -> "Unlimited"
        is TimeControl.Match -> "Match ${control.mainTime} +${control.increment}"
        is TimeControl.Turn -> "Turn ${control.turnTime}"
    }
  }
