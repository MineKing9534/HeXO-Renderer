error:
  profile.not.found: |-
    ## Profile not found
    The queried profile with id **${id.value}** was not found!

menu.profile:
  view.label: View in Browser
  reload.label: Reload
  stats.content: !<profile:Profile> |-
    **Member Since:** ${TimeFormat.DATE_SHORT.format(profile.registeredAt.toJavaInstant())}
    **Last Seen:** ${TimeFormat.RELATIVE.format(profile.lastActiveAt.toJavaInstant())}
    **ELO:** ${profile.statistics.elo}${ profile.statistics.eloHistory.highestPoint?.elo?.takeIf { it > profile.statistics.elo }?.let { " (Highest $it)" } ?: "" }

    ### :seedling: Overall Games
    ${menu_profile_stats_game(locale, profile.statistics.totalGames)}

    ### :trophy: Ranked Games
    ${menu_profile_stats_game(locale, profile.statistics.rankedGames)}
    **Streak:** ${profile.statistics.rankedGames.currentWinStreak} (Longest ${profile.statistics.rankedGames.longestWinStreak})

  # Internal helper to avoid duplication
  stats.game: !<stats:de.mineking.hexo.api.profile.ProfileStatistics.GameStatistics> |-
    **Games Played:** ${stats.played}
    **Games Won:** ${stats.won}${
      if (stats.played == 0) ""
      else " (${(stats.winRate * 100).roundToInt()}%)"
    }
