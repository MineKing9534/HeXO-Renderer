<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <title>HeXO: Authorization Successful</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
<main class="min-h-screen grid place-items-center px-4">
    <section class="w-full max-w-lg overflow-hidden rounded-2xl border border-white/10 bg-slate-900/80 shadow-2xl shadow-black/50">
        <div class="h-1.5 bg-gradient-to-r from-emerald-400 to-green-500"></div>
        <div class="p-8">
            <div class="flex flex-row gap-4 mb-8 items-center">
                <div class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-emerald-500/15 ring-1 ring-emerald-400/30">
                    <svg class="h-6 w-6 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 6 9 17l-5-5"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-semibold tracking-tight">Authorization Successful</h1>
            </div>
            <p class="text-sm leading-6 text-slate-300">
                Your Discord account is now connected. You can close this tab and return to Discord.
            </p>
            <p class="mt-5 -mx-2 rounded-xl border border-amber-300/25 bg-amber-500/10 px-4 py-3 text-sm leading-6 text-amber-100">
                <span class="mr-1 font-semibold uppercase tracking-wide text-amber-200">Note:</span>
                Make sure link your HeXO profile to your Discord account to be able to claim roles. To do so, use the
                <span class="mx-1 inline-flex items-center rounded-md border border-amber-300/30 bg-slate-950/60 px-1.5 py-0.5 font-mono text-xs font-semibold text-amber-300">/link</span>
                command in Discord.
            </p>
            <p class="mt-6 text-xs text-slate-500">HeXO Account Linking</p>
        </div>
    </section>
</main>
</body>
</html>
