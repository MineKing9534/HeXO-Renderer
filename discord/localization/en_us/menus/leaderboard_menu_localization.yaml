menu.leaderboard:
  title.content: "# :trophy: HeXO Leaderboard"
  details.placeholder: View a player's profile
  player.details: >-
    **`${entry.totalGames.played}`** Played, 
    **`${entry.totalGames.won}`** Won${
      if (entry.totalGames.played == 0) ""
      else " (**`${(entry.totalGames.winRate * 100).toInt()}%`**)"
    }, 
    **`${entry.elo}`** ELO
  reload.label: Reload
