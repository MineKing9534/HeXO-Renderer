error:
  match.not.found: |-
    ## Game not found
    The queried game with id **$id** was not found!

menu.game:
  title.content: !<match:Match> |-
    # ${
        when {
            match.tournament != null -> ":dart:"
            match.gameOptions.rated -> ":trophy:"
            else -> ":seedling:"
        }
    } Game Review
    -# https://hexo.did.science/games/${match.id}
    ${ match.tournament?.let { tournament ->
      "-# Tournament: [${tournament.name}](${tournament.url})${if (tournament.bestOf > 1) ", G${tournament.currentGameNumber} (BO${tournament.bestOf})" else ""}"
    } ?: "" }

  move:
    title: Enter the move to inspect
    inputs:
      move:
        label: Move number
        description: !<match:Match> The move to inspect [1-${match.moveCount}]
        placeholder: 42
  format.label: Print Notation
  turn.label: Show Turn Numbers

finish.reason: >-
  ${
    when (reason) {
        GameFinishReason.SixInARow -> "Six in a row"
        GameFinishReason.Timeout -> "Timeout"
        GameFinishReason.Surrender -> "Surrender"
        GameFinishReason.Disconnect -> "Disconnect"
        GameFinishReason.DrawAgreement -> "Draw"
        GameFinishReason.Terminated -> "Terminated"
    }
  }

time.control: >-
  ${
    when (control) {
        is TimeControl.Unlimited -> "Unlimited"
        is TimeControl.Match -> "Match ${control.mainTime} +${control.increment}"
        is TimeControl.Turn -> "Turn ${control.turnTime}"
    }
  }
